<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Books</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --cream: #f5f0e8;
    --parchment: #ebe4d6;
    --accent: #b44a2f;
    --accent-hover: #963c26;
    --muted: #7a7265;
    --shadow: rgba(26, 26, 26, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Subtle grain texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 5rem 2rem 3rem;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  header p {
    margin-top: 1rem;
    font-size: 1.1rem;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ── Decorative divider ── */
  .divider {
    width: 60px;
    height: 3px;
    background: var(--accent);
    margin: 2rem auto;
    border-radius: 2px;
  }

  /* ── BOOK GRID (home view) ── */
  #home {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 2rem 6rem;
  }

  .book-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 2.5rem;
  }

  .book-card {
    cursor: pointer;
    text-align: center;
    transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .book-card:hover { transform: translateY(-8px); }

  .cover-wrapper {
    position: relative;
    aspect-ratio: 2 / 3;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 6px 6px 20px var(--shadow), 0 0 0 1px rgba(0,0,0,0.04);
    transition: box-shadow 0.35s ease;
  }

  .book-card:hover .cover-wrapper {
    box-shadow: 8px 12px 30px rgba(26,26,26,0.22), 0 0 0 1px rgba(0,0,0,0.06);
  }

  .cover-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Placeholder cover when no image yet */
  .cover-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    line-height: 1.3;
    text-align: center;
    color: #fff;
  }

  .book-card h3 {
    margin-top: 1rem;
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    font-weight: 700;
  }

  /* ── BOOK DETAIL PAGE ── */
  #book-page {
    display: none;
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 2rem 6rem;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: none;
    border: none;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.95rem;
    color: var(--muted);
    cursor: pointer;
    padding: 0.5rem 0;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .back-btn:hover { color: var(--ink); }

  .back-btn svg { width: 18px; height: 18px; }

  .detail-layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 3rem;
    margin-top: 2rem;
    align-items: start;
  }

  @media (max-width: 640px) {
    .detail-layout {
      grid-template-columns: 1fr;
      gap: 2rem;
      justify-items: center;
    }
    .detail-layout .cover-wrapper { width: 200px; }
  }

  .detail-layout .cover-wrapper {
    aspect-ratio: 2 / 3;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 8px 10px 30px var(--shadow);
  }

  .detail-info h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.4rem);
    line-height: 1.2;
    margin-bottom: 0.3rem;
  }

  .detail-info .genre {
    color: var(--muted);
    font-size: 0.9rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 1.5rem;
  }

  .detail-info .description {
    font-size: 1.05rem;
    line-height: 1.75;
    color: #3a3630;
    margin-bottom: 2rem;
    font-weight: 300;
  }

  .buy-heading {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin-bottom: 0.8rem;
  }

  .buy-links {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
  }

  .buy-links a {
    display: inline-block;
    padding: 0.6rem 1.3rem;
    background: var(--ink);
    color: var(--cream);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    border-radius: 3px;
    transition: background 0.2s, transform 0.2s;
  }

  .buy-links a:hover {
    background: var(--accent);
    transform: translateY(-2px);
  }

  /* ── Fade-in animation ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .book-card {
    animation: fadeUp 0.5s ease both;
  }

  .book-card:nth-child(1) { animation-delay: 0.05s; }
  .book-card:nth-child(2) { animation-delay: 0.1s; }
  .book-card:nth-child(3) { animation-delay: 0.15s; }
  .book-card:nth-child(4) { animation-delay: 0.2s; }
  .book-card:nth-child(5) { animation-delay: 0.25s; }
  .book-card:nth-child(6) { animation-delay: 0.3s; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>

<header>
  <h1>My Books</h1>
  <p>Florian Egger</p>
  <div class="divider"></div>
</header>

<!-- ══════ HOME: BOOK GRID ══════ -->
<section id="home">
  <div class="book-grid" id="book-grid"></div>
</section>

<!-- ══════ BOOK DETAIL PAGE ══════ -->
<section id="book-page">
  <button class="back-btn" onclick="showHome()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    All Books
  </button>
  <div class="detail-layout">
    <div class="cover-wrapper" id="detail-cover"></div>
    <div class="detail-info">
      <h2 id="detail-title"></h2>
      <div class="genre" id="detail-genre"></div>
      <p class="description" id="detail-description"></p>
      <h3 class="buy-heading">Available at</h3>
      <div class="buy-links" id="detail-buy-links"></div>
    </div>
  </div>
</section>

<footer>&copy; 2026 Florian Egger. All rights reserved.</footer>

<script>
  // ╔══════════════════════════════════════════════════════╗
  // ║  EDIT YOUR BOOKS HERE                                ║
  // ║  - Replace cover images, titles, descriptions, etc.  ║
  // ║  - Add or remove books by adding/removing objects     ║
  // ╚══════════════════════════════════════════════════════╝

  const books = [
    {
      id: "lifestock",
      title: "Lifestock",
      genre: "Fiction",
      cover: "covers/lifestock.jpg",
      placeholderColor: "#0d1b2a",
      description: "Aboard the interstellar vessel Oikos 5, a civilisation is crossing the dark toward a new world. The journey takes generations. The Company has made sure certain people will live to see it completed.
Noah has been alive for centuries. He is the ship's historian — ancient, habituated, quietly burdened by a past so long it has stopped feeling like one. He knows how the ship works. He knows what is required of him. Tomorrow, it is his turn.
Lillie is a teacher in the lower colonies. This morning, two guards were waiting outside her classroom. They told her it was something good. They told her not to worry.
She is nine months pregnant, and she has just been escorted — for the first time in her life — into the part of the ship she was never supposed to see.
These two people will never meet. What connects them is something neither of them will say aloud, in a system built on the assumption that the people who bear its cost will never be told what it is.
Lifestock is a novel about the distance between knowledge and ignorance, between centuries and a single day, between a life preserved and a life that has just begun. It is told in two voices moving toward the same moment from opposite ends of the same ship — one who understands exactly what is coming, and one who does not.",
      buyLinks: [
        { name: "Amazon", url: "https://amazon.com" },
      ]
    },
  ];

  // ── Render the grid ──
  const grid = document.getElementById('book-grid');

  books.forEach(book => {
    const card = document.createElement('div');
    card.className = 'book-card';
    card.onclick = () => showBook(book.id);

    const coverContent = book.cover
      ? `<img src="${book.cover}" alt="${book.title} cover">`
      : `<div class="cover-placeholder" style="background:${book.placeholderColor}">${book.title}</div>`;

    card.innerHTML = `
      <div class="cover-wrapper">${coverContent}</div>
      <h3>${book.title}</h3>
    `;
    grid.appendChild(card);
  });

  // ── Navigation ──
  function showBook(id) {
    const book = books.find(b => b.id === id);
    if (!book) return;

    document.getElementById('detail-title').textContent = book.title;
    document.getElementById('detail-genre').textContent = book.genre;
    document.getElementById('detail-description').textContent = book.description;

    const coverEl = document.getElementById('detail-cover');
    coverEl.innerHTML = book.cover
      ? `<img src="${book.cover}" alt="${book.title} cover">`
      : `<div class="cover-placeholder" style="background:${book.placeholderColor}">${book.title}</div>`;

    const linksEl = document.getElementById('detail-buy-links');
    linksEl.innerHTML = book.buyLinks
      .map(l => `<a href="${l.url}" target="_blank" rel="noopener">${l.name}</a>`)
      .join('');

    document.getElementById('home').style.display = 'none';
    document.getElementById('book-page').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showHome() {
    document.getElementById('book-page').style.display = 'none';
    document.getElementById('home').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>

</body>
</html>
